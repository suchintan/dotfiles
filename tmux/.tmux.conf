# use | and - to split the windows
bind-key | split-window -h
bind-key - split-window -v

# make the first window number start at 1
set -g base-index 1

# from http://endot.org/2011/12/06/my-tmux-configuration/
# keybindings to make resizing easier
bind -r C-h resize-pane -L
bind -r C-j resize-pane -D
bind -r C-k resize-pane -U
bind -r C-l resize-pane -R

# Bind Control-A instead of Control-B
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Bind pane selection to arrow keys
bind-key Up    select-pane -U
bind-key Down  select-pane -D
bind-key Left  select-pane -L
bind-key Right select-pane -R

# Sane scrolling
set -g mouse on

if-shell '[ -f ~/.tmux.conf.local ]' 'source-file ~/.tmux.conf.local'

# ------------------------------------------------------------
# --- Status Bar ---------------------------------------------
# ------------------------------------------------------------

# --- improve colors
set -g default-terminal 'screen-256color'

# --- change the colors of the status bar
set -g status-style bg=black,fg=white

# --- style the regular window
set -g window-status-style fg=cyan,bg=default,dim

# --- style the active window
set -g window-status-current-style fg=white,bg=red,bright

# --- define colors for pane borders
set -g pane-border-style fg=green,bg=black
set -g pane-active-border-style fg=black,bg=green

# --- configure the status bar items
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"

# --- refresh the status bar every 60 seconds
set -g status-interval 60

# --- center the window list
set -g status-justify centre

# --- identify activity in other windows
setw -g monitor-activity on
set -g visual-activity on

# vi-style controls in copy mode
set-option -g status-keys vi
set-window-option -g mode-keys vi

# v and y like vi in copy-mode
bind i copy-mode
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
